<svg xmlns="http://www.w3.org/2000/svg" width="560px" height="95px" viewBox="0 0 560 95" direction="ltr">
    <style>
        .card-border {
            stroke: #2F3147;
            stroke-width: 1.5;
            fill: #1A1B27;
            rx: 10px;
        }
    </style>
    <rect class="card-border" width="558" height="93" x="1" y="1" />

    <g>
        <!-- Target Pulsing Radar Dot -->
        <circle cx="28" cy="28" r="4" fill="#70A5FD" />
        <circle cx="28" cy="28" r="8" fill="none" stroke="#70A5FD" stroke-width="1.2">
            <animate attributeName="r" values="4;10;4" dur="2.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite" />
        </circle>
        
        <!-- Goal Text -->
        <text x="44" y="28" fill="#A9B1D6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" font-weight="700">Federated Learning Research</text>
        <text x="44" y="40" fill="#565F89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9.5px">Privacy-Preserving Distributed ML</text>
    </g>

    <g>
        <!-- Target Pulsing Radar Dot -->
        <circle cx="298" cy="28" r="4" fill="#38BDAE" />
        <circle cx="298" cy="28" r="8" fill="none" stroke="#38BDAE" stroke-width="1.2">
            <animate attributeName="r" values="4;10;4" dur="2.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite" />
        </circle>
        
        <!-- Goal Text -->
        <text x="314" y="28" fill="#A9B1D6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" font-weight="700">Production ML Systems</text>
        <text x="314" y="40" fill="#565F89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9.5px">Drift Detection &amp; Model Monitoring</text>
    </g>

    <g>
        <!-- Target Pulsing Radar Dot -->
        <circle cx="28" cy="64" r="4" fill="#BF91F3" />
        <circle cx="28" cy="64" r="8" fill="none" stroke="#BF91F3" stroke-width="1.2">
            <animate attributeName="r" values="4;10;4" dur="2.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite" />
        </circle>
        
        <!-- Goal Text -->
        <text x="44" y="64" fill="#A9B1D6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" font-weight="700">Open Source Contributions</text>
        <text x="44" y="76" fill="#565F89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9.5px">Building AI tools and libraries</text>
    </g>

    <g>
        <!-- Target Pulsing Radar Dot -->
        <circle cx="298" cy="64" r="4" fill="#FF9E64" />
        <circle cx="298" cy="64" r="8" fill="none" stroke="#FF9E64" stroke-width="1.2">
            <animate attributeName="r" values="4;10;4" dur="2.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite" />
        </circle>
        
        <!-- Goal Text -->
        <text x="314" y="64" fill="#A9B1D6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12px" font-weight="700">Scalable Data Pipelines</text>
        <text x="314" y="76" fill="#565F89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9.5px">ETL, streaming, and containerized analytics</text>
    </g>
</svg>
