    <path class="rocket" d="M12 2s3 2 3 7c0 2-1 4-2 5l4 4a1 1 0 0 1-1.4 1.4l-4-4c-1 1-3 2-5 2-5 0-7-3-7-3s2-1 2-4V9c0-5 3-7 3-7zm-3 8a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/>
</svg>
