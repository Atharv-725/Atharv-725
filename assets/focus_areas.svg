        <g transform="translate(30, 76) scale(0.85)">
            <path d="M2 4h20v12H2zm10 16h2v-4h-2zm-6 0h12v-1h-12z" fill="#FF9E64" />
        </g>
        <!-- Title Text -->
        <text x="56" y="90" class="pill-text" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" font-weight="600">Production ML</text>
    </g>

    <g class="float-5">
        <!-- Glassmorphic Card Pill -->
        <rect x="204" y="68" width="166" height="36" class="pill-bg" rx="18" stroke="#FFD43B" stroke-width="1.2" />
        <!-- Tech Icon -->
        <g transform="translate(214, 76) scale(0.85)">
            <path d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10-4.48-10-10-10zm-1 15.5v-3.5H9v-1h2v-3H9v-1h2v-2.5h2V6.5h2v1h-2v3h2v1h-2v3h2v1h-2v3.5h-2z" fill="#FFD43B" />
        </g>
        <!-- Title Text -->
        <text x="240" y="90" class="pill-text" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" font-weight="600">Quantum Computing</text>
    </g>

    <g class="float-6">
        <!-- Glassmorphic Card Pill -->
        <rect x="388" y="68" width="166" height="36" class="pill-bg" rx="18" stroke="#9013FE" stroke-width="1.2" />
        <!-- Tech Icon -->
        <g transform="translate(398, 76) scale(0.85)">
            <path d="M19 15c-1.2 0-2.28-.56-3-1.43L9.4 17.5c.37.73.6 1.55.6 2.5 0 2.76-2.24 5-5 5s-5-2.24-5-5 2.24-5 5-5c1.2 0 2.28.56 3 1.43l6.6-3.93c-.37-.73-.6-1.55-.6-2.5 0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5z" fill="#9013FE" />
        </g>
        <!-- Title Text -->
        <text x="424" y="90" class="pill-text" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" font-weight="600">Model Observability</text>
