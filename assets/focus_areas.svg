<svg xmlns="http://www.w3.org/2000/svg" width="560px" height="135px" viewBox="0 0 560 135" direction="ltr">
    <style>
        @keyframes float-keyframes-1 {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
            100% { transform: translateY(0px); }
        }
        @keyframes float-keyframes-2 {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-2px); }
            100% { transform: translateY(0px); }
        }
        @keyframes float-keyframes-3 {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-2.5px); }
            100% { transform: translateY(0px); }
        }
        
        .float-1 { animation: float-keyframes-1 3s ease-in-out infinite; }
        .float-2 { animation: float-keyframes-2 3.6s ease-in-out infinite; animation-delay: 0.3s; }
        .float-3 { animation: float-keyframes-3 4.2s ease-in-out infinite; animation-delay: 0.6s; }
        .float-4 { animation: float-keyframes-1 3.3s ease-in-out infinite; animation-delay: 0.9s; }
        .float-5 { animation: float-keyframes-2 3.9s ease-in-out infinite; animation-delay: 1.2s; }
        .float-6 { animation: float-keyframes-3 4.5s ease-in-out infinite; animation-delay: 1.5s; }
        
        .card-border {
            stroke: #2F3147;
            stroke-width: 1.5;
            fill: #1A1B27;
            rx: 10px;
        }
        .pill-bg {
            fill: #1F2335;
            transition: all 0.3s ease;
        }
        .pill-bg:hover {
            fill: #24283B;
            filter: drop-shadow(0 0 5px rgba(112, 165, 253, 0.3));
        }
        .pill-text {
            fill: #A9B1D6;
        }
    </style>
    <rect class="card-border" width="558" height="133" x="1" y="1" />

    <g class="float-1">
        <!-- Glassmorphic Card Pill -->
        <rect x="20" y="20" width="166" height="36" class="pill-bg" rx="18" stroke="#BF91F3" stroke-width="1.2" />
        <!-- Tech Icon -->
        <g transform="translate(30, 28) scale(0.85)">
            <path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.07 19.58 10.49 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z" fill="#BF91F3" />
        </g>
        <!-- Title Text -->
        <text x="56" y="42" class="pill-text" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" font-weight="600">Machine Learning</text>
    </g>

    <g class="float-2">
        <!-- Glassmorphic Card Pill -->
        <rect x="204" y="20" width="166" height="36" class="pill-bg" rx="18" stroke="#70A5FD" stroke-width="1.2" />
        <!-- Tech Icon -->
        <g transform="translate(214, 28) scale(0.85)">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="#70A5FD" />
        </g>
        <!-- Title Text -->
        <text x="240" y="42" class="pill-text" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" font-weight="600">Federated Learning</text>
    </g>

    <g class="float-3">
        <!-- Glassmorphic Card Pill -->
        <rect x="388" y="20" width="166" height="36" class="pill-bg" rx="18" stroke="#38BDAE" stroke-width="1.2" />
        <!-- Tech Icon -->
        <g transform="translate(398, 28) scale(0.85)">
            <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z" fill="#38BDAE" />
        </g>
        <!-- Title Text -->
        <text x="424" y="42" class="pill-text" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" font-weight="600">Data Engineering</text>
    </g>

    <g class="float-4">
        <!-- Glassmorphic Card Pill -->
        <rect x="20" y="68" width="166" height="36" class="pill-bg" rx="18" stroke="#FF9E64" stroke-width="1.2" />
