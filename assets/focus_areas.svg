<svg xmlns="http://www.w3.org/2000/svg" width="560px" height="135px" viewBox="0 0 560 135" direction="ltr">
    <style>
        @keyframes float-keyframes-1 {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
            100% { transform: translateY(0px); }
        }
        @keyframes float-keyframes-2 {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-2px); }
            100% { transform: translateY(0px); }
        }
        @keyframes float-keyframes-3 {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-2.5px); }
            100% { transform: translateY(0px); }
        }
        
        .float-1 { animation: float-keyframes-1 3s ease-in-out infinite; }
        .float-2 { animation: float-keyframes-2 3.6s ease-in-out infinite; animation-delay: 0.3s; }
        .float-3 { animation: float-keyframes-3 4.2s ease-in-out infinite; animation-delay: 0.6s; }
        .float-4 { animation: float-keyframes-1 3.3s ease-in-out infinite; animation-delay: 0.9s; }
        .float-5 { animation: float-keyframes-2 3.9s ease-in-out infinite; animation-delay: 1.2s; }
        .float-6 { animation: float-keyframes-3 4.5s ease-in-out infinite; animation-delay: 1.5s; }
        
        .card-border {
            stroke: #2F3147;
            stroke-width: 1.5;
            fill: #1A1B27;
            rx: 10px;
        }
        .pill-bg {
            fill: #1F2335;
            transition: all 0.3s ease;
        }
        .pill-bg:hover {
            fill: #24283B;
            filter: drop-shadow(0 0 5px rgba(112, 165, 253, 0.3));
        }
        .pill-text {
            fill: #A9B1D6;
        }
    </style>
    <rect class="card-border" width="558" height="133" x="1" y="1" />

    <g class="float-1">
        <!-- Glassmorphic Card Pill -->
        <rect x="20" y="20" width="166" height="36" class="pill-bg" rx="18" stroke="#70A5FD" stroke-width="1.2" />
        <!-- Tech Icon -->
        <g transform="translate(30, 28) scale(0.85)">
            <path d="M2 4h20v12H2zm10 16h2v-4h-2zm-6 0h12v-1h-12z" fill="#70A5FD" />
        </g>
        <!-- Title Text -->
        <text x="56" y="42" class="pill-text" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" font-weight="600">Full Stack Dev</text>
    </g>

    <g class="float-2">
        <!-- Glassmorphic Card Pill -->
        <rect x="204" y="20" width="166" height="36" class="pill-bg" rx="18" stroke="#38BDAE" stroke-width="1.2" />
        <!-- Tech Icon -->
        <g transform="translate(214, 28) scale(0.85)">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z" fill="#38BDAE" />
        </g>
        <!-- Title Text -->
        <text x="240" y="42" class="pill-text" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" font-weight="600">Large Language Models</text>
    </g>

    <g class="float-3">
        <!-- Glassmorphic Card Pill -->
        <rect x="388" y="20" width="166" height="36" class="pill-bg" rx="18" stroke="#FF9E64" stroke-width="1.2" />
        <!-- Tech Icon -->
        <g transform="translate(398, 28) scale(0.85)">
            <path d="M19 12H5V5h14zm0-9H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" fill="#FF9E64" />
