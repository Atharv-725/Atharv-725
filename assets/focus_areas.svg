    </g>

    <g class="float-4">
        <!-- Glassmorphic Card Pill -->
        <rect x="20" y="68" width="166" height="36" class="pill-bg" rx="18" stroke="#BF91F3" stroke-width="1.2" />
        <!-- Tech Icon -->
        <g transform="translate(30, 76) scale(0.85)">
            <path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.07 19.58 10.49 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z" fill="#BF91F3" />
        </g>
        <!-- Title Text -->
        <text x="56" y="90" class="pill-text" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" font-weight="600">Machine Learning</text>
    </g>

    <g class="float-5">
        <!-- Glassmorphic Card Pill -->
        <rect x="204" y="68" width="166" height="36" class="pill-bg" rx="18" stroke="#FFD43B" stroke-width="1.2" />
        <!-- Tech Icon -->
        <g transform="translate(214, 76) scale(0.85)">
            <path d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10-4.48-10-10-10zm-1 15.5v-3.5H9v-1h2v-3H9v-1h2v-2.5h2V6.5h2v1h-2v3h2v1h-2v3h2v1h-2v3.5h-2z" fill="#FFD43B" />
        </g>
        <!-- Title Text -->
        <text x="240" y="90" class="pill-text" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" font-weight="600">Java Programming</text>
    </g>

    <g class="float-6">
        <!-- Glassmorphic Card Pill -->
        <rect x="388" y="68" width="166" height="36" class="pill-bg" rx="18" stroke="#9013FE" stroke-width="1.2" />
        <!-- Tech Icon -->
        <g transform="translate(398, 76) scale(0.85)">
            <path d="M19 15c-1.2 0-2.28-.56-3-1.43L9.4 17.5c.37.73.6 1.55.6 2.5 0 2.76-2.24 5-5 5s-5-2.24-5-5 2.24-5 5-5c1.2 0 2.28.56 3 1.43l6.6-3.93c-.37-.73-.6-1.55-.6-2.5 0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5z" fill="#9013FE" />
        </g>
        <!-- Title Text -->
        <text x="424" y="90" class="pill-text" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11px" font-weight="600">DSA &amp; Algorithms</text>
